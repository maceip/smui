name: Deploy gallery to GitHub Pages

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      base_path:
        description: "Base path for project Pages, for example /smui. Use / for a custom domain."
        required: false
        type: string

run-name: Deploy gallery from ${{ github.ref_name }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    env:
      NEXT_PUBLIC_BASE_PATH: ${{ inputs.base_path || format('/{0}', github.event.repository.name) }}
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static gallery
        run: npm run pages:build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy selected branch to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
